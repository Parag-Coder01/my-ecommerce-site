<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | Safari Premium</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .checkout-container {
      display: flex;
      gap: 40px;
      align-items: flex-start;
    }
    
    .checkout-form-section {
      flex: 2;
    }
    
    .checkout-summary {
      flex: 1;
      position: sticky;
      top: 100px;
    }
    
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    
    .full-width {
      grid-column: 1 / -1;
    }
    
    .section-title {
      font-size: 1.25rem;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Delivery Tracker */
    .tracker-container {
      display: none; /* Shown after success */
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
      text-align: center;
    }
    
    .tracker-steps {
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 800px;
      margin: 40px 0;
      position: relative;
    }
    
    .tracker-steps::before {
      content: '';
      position: absolute;
      top: 20px;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--border-color);
      z-index: 1;
    }
    
    .tracker-progress {
      position: absolute;
      top: 20px;
      left: 0;
      height: 4px;
      background: var(--accent-primary);
      z-index: 2;
      transition: width 0.5s ease;
      width: 0%;
    }
    
    .step {
      position: relative;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 25%;
    }
    
    .step-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--bg-surface);
      border: 3px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      font-size: 1.2rem;
      transition: all 0.3s;
    }
    
    .step.active .step-icon {
      border-color: var(--accent-primary);
      background: var(--accent-primary);
      color: white;
      box-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
    }
    
    .step.completed .step-icon {
      border-color: var(--success);
      background: var(--success);
      color: white;
    }
    
    .step-label {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-secondary);
    }
    
    .step.active .step-label {
      color: var(--text-primary);
      font-weight: 700;
    }

    .success-animation {
      width: 100px;
      height: 100px;
      background: var(--success);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 3rem;
      margin-bottom: 20px;
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      transform: scale(0);
    }

    @keyframes popIn {
      to { transform: scale(1); }
    }

    @media (max-width: 900px) {
      .checkout-container {
        flex-direction: column-reverse;
      }
      .checkout-summary {
        width: 100%;
        position: static;
      }
      .form-grid {
        grid-template-columns: 1fr;
      }
      .full-width {
        grid-column: 1;
      }
    }

    @media (max-width: 600px) {
      .step-label {
        font-size: 0.7rem;
      }
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">Safari.</a>
      <ul class="nav-links">
        <li><a href="index.html" class="nav-link">Home</a></li>
      </ul>
      <div class="nav-actions">
        <button id="theme-toggle" class="icon-btn">
          <i id="theme-icon" class="fas fa-sun"></i>
        </button>
        <a href="cart.html" class="icon-btn">
          <i class="fas fa-shopping-bag"></i>
          <span id="cart-badge" class="cart-badge" style="display: none;">0</span>
        </a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main>
    <div id="checkout-view">
      <h1 style="margin-bottom: 30px;">Secure Checkout</h1>
      <div class="checkout-container">
        
        <div class="glass-card checkout-form-section">
          <form id="checkout-form">
            <!-- Shipping Info -->
            <h3 class="section-title"><i class="fas fa-truck"></i> Shipping Address</h3>
            <div class="form-grid">
              <div class="input-group">
                <label>First Name</label>
                <input type="text" class="input-control" required>
              </div>
              <div class="input-group">
                <label>Last Name</label>
                <input type="text" class="input-control" required>
              </div>
              <div class="input-group full-width">
                <label>Address</label>
                <input type="text" class="input-control" placeholder="123 Main St" required>
              </div>
              <div class="input-group">
                <label>City</label>
                <input type="text" class="input-control" required>
              </div>
              <div class="input-group">
                <label>Zip Code</label>
                <input type="text" class="input-control" required>
              </div>
            </div>

            <!-- Payment Info -->
            <h3 class="section-title" style="margin-top: 30px;"><i class="fas fa-credit-card"></i> Payment Method</h3>
            
            <div style="display: flex; gap: 20px; margin-bottom: 20px; padding: 15px; background: var(--bg-glass); border-radius: var(--radius-md); border: 1px solid var(--border-color);">
              <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: 600;">
                <input type="radio" name="payment-method" value="card" checked> <i class="far fa-credit-card"></i> Credit/Debit Card
              </label>
              <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: 600;">
                <input type="radio" name="payment-method" value="cod"> <i class="fas fa-money-bill-wave" style="color: var(--success);"></i> Cash on Delivery (COD)
              </label>
            </div>

            <div id="card-details-container" class="form-grid">
              <div class="input-group full-width">
                <label>Name on Card</label>
                <input type="text" class="input-control" required>
              </div>
              <div class="input-group full-width">
                <label>Card Number</label>
                <input type="text" id="cc-number" class="input-control" placeholder="0000 0000 0000 0000" maxlength="19" required>
              </div>
              <div class="input-group">
                <label>Expiry (MM/YY)</label>
                <input type="text" id="cc-exp" class="input-control" placeholder="MM/YY" maxlength="5" required>
              </div>
              <div class="input-group">
                <label>CVV</label>
                <input type="text" id="cc-cvv" class="input-control" placeholder="123" maxlength="4" required>
              </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block mt-8" style="font-size: 1.1rem; padding: 15px;">Place Order</button>
          </form>
        </div>

        <div class="glass-card checkout-summary">
          <h3 style="margin-bottom: 20px;">Order Summary</h3>
          <div id="checkout-items"></div>
          <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 20px 0;">
          <div style="display: flex; justify-content: space-between; font-weight: 700; font-size: 1.2rem;">
            <span>Total to Pay</span>
            <span id="checkout-total">₹0.00</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Tracker View -->
    <div id="tracker-view" class="tracker-container glass-card">
      <div class="success-animation">
        <i class="fas fa-check"></i>
      </div>
      <h2>Order Placed Successfully!</h2>
      <p style="color: var(--text-secondary); margin-top: 10px;">Order ID: #<span id="order-id"></span></p>
      
      <div class="tracker-steps">
        <div class="tracker-progress" id="tracker-progress"></div>
        <div class="step" id="step-1">
          <div class="step-icon"><i class="fas fa-box"></i></div>
          <div class="step-label">Order Placed</div>
        </div>
        <div class="step" id="step-2">
          <div class="step-icon"><i class="fas fa-cog"></i></div>
          <div class="step-label">Processing</div>
        </div>
        <div class="step" id="step-3">
          <div class="step-icon"><i class="fas fa-truck-fast"></i></div>
          <div class="step-label">In Transit</div>
        </div>
        <div class="step" id="step-4">
          <div class="step-icon"><i class="fas fa-home"></i></div>
          <div class="step-label">Delivered</div>
        </div>
      </div>

      <p id="tracker-status-text" style="margin-top: 30px; font-weight: 600; font-size: 1.1rem;">We've received your order.</p>
      <a href="index.html" class="btn btn-secondary mt-8">Continue Shopping</a>
    </div>

  </main>

  <script src="js/app.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
