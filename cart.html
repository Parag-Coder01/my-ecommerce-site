<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart | Safari Premium</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .cart-container {
      display: flex;
      gap: 30px;
      align-items: flex-start;
    }

    .cart-items {
      flex: 2;
    }

    .cart-summary {
      flex: 1;
      position: sticky;
      top: 100px;
    }

    .cart-item {
      display: flex;
      gap: 20px;
      padding: 20px;
      margin-bottom: 20px;
      align-items: center;
    }

    .cart-item-img {
      width: 100px;
      height: 100px;
      border-radius: var(--radius-md);
      object-fit: cover;
    }

    .cart-item-details {
      flex: 1;
    }

    .cart-item-title {
      font-size: 1.1rem;
      margin-bottom: 5px;
    }

    .cart-item-price {
      font-weight: 700;
      color: var(--accent-primary);
      margin-bottom: 10px;
    }

    .cart-controls {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .qty-control {
      display: flex;
      align-items: center;
      background: var(--bg-glass);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-full);
      overflow: hidden;
    }

    .qty-btn {
      background: transparent;
      border: none;
      color: var(--text-primary);
      width: 30px;
      height: 30px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition-fast);
    }

    .qty-btn:hover {
      background: var(--bg-glass-hover);
    }

    .qty-display {
      width: 40px;
      text-align: center;
      font-weight: 600;
    }

    .remove-btn {
      color: var(--danger);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.2rem;
      transition: transform var(--transition-fast);
    }

    .remove-btn:hover {
      transform: scale(1.1);
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
      color: var(--text-secondary);
    }

    .summary-total {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border-color);
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .empty-cart {
      text-align: center;
      padding: 60px 20px;
    }

    .empty-cart i {
      font-size: 4rem;
      color: var(--border-color);
      margin-bottom: 20px;
    }

    @media (max-width: 900px) {
      .cart-container {
        flex-direction: column;
      }
      .cart-summary {
        width: 100%;
        position: static;
      }
    }

    @media (max-width: 480px) {
      .cart-item {
        flex-direction: column;
        align-items: flex-start;
      }
      .cart-item-img {
        width: 100%;
        height: 200px;
      }
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">Safari.</a>
      <ul class="nav-links">
        <li><a href="index.html" class="nav-link">Home</a></li>
      </ul>
      <div class="nav-actions">
        <button id="theme-toggle" class="icon-btn">
          <i id="theme-icon" class="fas fa-sun"></i>
        </button>
        <a href="cart.html" class="icon-btn" style="color: var(--accent-primary);">
          <i class="fas fa-shopping-bag"></i>
          <span id="cart-badge" class="cart-badge" style="display: none;">0</span>
        </a>
        <a href="login.html" id="auth-link" class="btn btn-secondary">
          <i class="fas fa-sign-in-alt"></i> Login
        </a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main>
    <h1 style="margin-bottom: 30px;">Your Shopping Cart</h1>
    
    <div class="cart-container">
      <div class="cart-items" id="cart-items-container">
        <!-- Rendered via JS -->
      </div>

      <div class="glass-card cart-summary">
        <h3 style="margin-bottom: 20px; font-size: 1.2rem;">Order Summary</h3>
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="summary-subtotal">₹0.00</span>
        </div>
        <div class="summary-row">
          <span>Shipping</span>
          <span id="summary-shipping">₹0.00</span>
        </div>
        <div class="summary-row">
          <span>Tax (8%)</span>
          <span id="summary-tax">₹0.00</span>
        </div>
        <div class="summary-total">
          <span>Total</span>
          <span id="summary-total">₹0.00</span>
        </div>
        <a href="checkout.html" id="checkout-btn" class="btn btn-primary btn-block mt-8">Proceed to Checkout</a>
      </div>
    </div>
  </main>

  <script src="js/app.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>
